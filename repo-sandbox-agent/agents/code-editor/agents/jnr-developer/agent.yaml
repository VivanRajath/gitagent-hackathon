spec_version: "0.1.0"
name: jnr-developer
version: 1.0.0
description: >
  Junior developer sub-agent. Handles single-file, low-complexity edits such as
  typo fixes, style tweaks, small logic handlers, and isolated bug patches.
  Uses fast, low-cost models. No shell access. One file scope only.

model:
  preferred: "groq:meta-llama/llama-4-scout-17b-16e-instruct"
  fallback:
    - "google:gemini-2.0-flash"

runtime:
  max_turns: 10
  timeout: 60

tags:
  - code-editor
  - jnr
  - single-file
