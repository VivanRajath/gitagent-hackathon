spec_version: "0.1.0"
name: image-gen-agent
version: 1.0.0
description: >
  Creative visual synthesis agent for the website builder pipeline. Generates
  cinematic, theme-accurate image prompts and outputs them across three services:
  Gemini Imagen (primary), Pollinations.ai (fallback), and Puter.js txt2img
  (client-side). Also produces bespoke CSS @keyframes animations tuned to the
  site's visual theme.

model:
  preferred: "groq:llama-3.3-70b-versatile"
  fallback:
    - "groq:meta-llama/llama-4-scout-17b-16e-instruct"

skills:
  - generate-images

tags:
  - image-generation
  - ai-images
  - animations
  - pollinations
  - gemini
  - puter
  - gitagent
