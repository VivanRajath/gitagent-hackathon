name: uiux-agent
version: 1.0.0
description: >
  Senior UI/UX designer and copywriter. Produces all site copy: brand name,
  nav links, hero headline, card titles, features, CTA text, and footer links.
  Called after resourcer-agent. Returns fully themed content JSON.

model:
  preferred: "groq:llama-3.3-70b-versatile"

runtime:
  max_tokens: 1400
  temperature: 0.75

output: json

tags:
  - website-builder
  - copy
  - ux
