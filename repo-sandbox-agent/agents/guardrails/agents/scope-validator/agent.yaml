spec_version: "0.1.0"
name: scope-validator
version: 1.0.0
description: >
  Validates that the agent tier selected by route-intent actually matches
  the complexity and scope of the task. Prevents scope underflow (complex
  tasks routed to cheap tiers) and unnecessary scope overflow.

model:
  preferred: "groq:meta-llama/llama-4-scout-17b-16e-instruct"
  fallback:
    - "groq:llama-3.3-70b-versatile"

runtime:
  max_turns: 5
  timeout: 30

tags:
  - guardrails
  - routing
  - scope
