spec_version: "0.1.0"
name: devpost-searcher
version: 1.0.0
description: >
  Searches Devpost for hackathon projects matching a query. Returns project
  names, links, and taglines for the research-agent to aggregate.

model:
  preferred: "groq:meta-llama/llama-4-scout-17b-16e-instruct"
  fallback:
    - "groq:llama-3.3-70b-versatile"

runtime:
  max_turns: 5
  timeout: 30

tags:
  - research
  - devpost
  - search
