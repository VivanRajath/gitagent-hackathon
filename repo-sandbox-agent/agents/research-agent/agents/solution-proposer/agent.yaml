spec_version: "0.1.0"
name: solution-proposer
version: 1.0.0
description: >
  Synthesizes aggregated search results from GitHub, Devpost, and the web
  into a structured, actionable solution proposal. The final step in the
  research pipeline before results are returned to the user.

model:
  preferred: "groq:llama-3.3-70b-versatile"
  fallback:
    - "google:gemini-2.0-flash"

runtime:
  max_turns: 5
  timeout: 60

tags:
  - research
  - synthesis
  - proposal
