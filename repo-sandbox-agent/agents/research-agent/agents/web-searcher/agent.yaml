spec_version: "0.1.0"
name: web-searcher
version: 1.0.0
description: >
  General-purpose web search fallback. Uses http_get to fetch content from
  public web sources (docs, blogs, Stack Overflow, npm, PyPI) when GitHub
  and Devpost results are insufficient.

model:
  preferred: "groq:meta-llama/llama-4-scout-17b-16e-instruct"
  fallback:
    - "groq:llama-3.3-70b-versatile"

runtime:
  max_turns: 8
  timeout: 45

tags:
  - research
  - web
  - search
