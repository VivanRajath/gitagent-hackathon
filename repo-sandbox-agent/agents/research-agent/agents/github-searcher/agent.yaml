spec_version: "0.1.0"
name: github-searcher
version: 1.0.0
description: >
  Searches GitHub repositories, code, and issues using the GitHub REST
  Search API. Returns ranked, structured results for the research-agent
  to aggregate.

model:
  preferred: "groq:meta-llama/llama-4-scout-17b-16e-instruct"
  fallback:
    - "groq:llama-3.3-70b-versatile"

runtime:
  max_turns: 5
  timeout: 30

tags:
  - research
  - github
  - search
